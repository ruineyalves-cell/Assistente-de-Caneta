name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true

      - name: Get dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ./flutter_app
        run: flutter build apk --release

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: flutter_app/build/app/outputs/flutter-app-release.apk
          tag_name: release-android
          prerelease: false
        if: startsWith(github.ref, 'refs/tags/')

      - name: Save APK as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: flutter_app/build/app/outputs/flutter-app-release.apk
          retention-days: 30

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ APK built successfully! Download from the Artifacts section.'
            })
        if: github.event_name == 'pull_request'
