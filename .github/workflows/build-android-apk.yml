name: Build Android APK + AAB (Recorpo)

on:
  push:
    branches: [ main ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          cache: true

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_B64 secret missing"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > flutter_app/android/app/google-services.json
          echo "google-services.json written ($(wc -c < flutter_app/android/app/google-services.json) bytes)"

      - name: Decode release keystore (if secrets present)
        id: keystore
        env:
          RECORPO_KEYSTORE_BASE64: ${{ secrets.RECORPO_KEYSTORE_BASE64 }}
          RECORPO_KEYSTORE_PASSWORD: ${{ secrets.RECORPO_KEYSTORE_PASSWORD }}
          RECORPO_KEY_ALIAS: ${{ secrets.RECORPO_KEY_ALIAS }}
          RECORPO_KEY_PASSWORD: ${{ secrets.RECORPO_KEY_PASSWORD }}
        run: |
          if [ -z "$RECORPO_KEYSTORE_BASE64" ]; then
            echo "::warning::Release keystore secrets ausentes — build sairá assinado com debug key (não publicável)."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # base64 -d rejeita whitespace por padrão; tr -d limpa caso o
          # secret tenha newline inserido pelo GitHub. -w0 no output evita
          # wrap desnecessário.
          echo "$RECORPO_KEYSTORE_BASE64" | tr -d ' \n\r' | base64 -d > flutter_app/android/app/recorpo-release.jks

          # PKCS12 keystore exige key password == store password (spec).
          # Ignoramos o RECORPO_KEY_PASSWORD e usamos storePassword nas duas
          # linhas — resolve "Get Key failed: final block not properly padded".
          # storeFile fica relativo ao módulo `app/` (Gradle resolve via
          # file(...) dentro do app/build.gradle.kts).
          cat > flutter_app/android/key.properties <<EOF
          storeFile=recorpo-release.jks
          storePassword=$RECORPO_KEYSTORE_PASSWORD
          keyAlias=$RECORPO_KEY_ALIAS
          keyPassword=$RECORPO_KEYSTORE_PASSWORD
          EOF

          # Validação cedo: se a keystore ou senha estiverem erradas, o
          # keytool já falha aqui com mensagem clara — evita perder 5min
          # até o Gradle explodir com erro criptográfico obscuro.
          keytool -list -v -keystore flutter_app/android/app/recorpo-release.jks \
            -alias "$RECORPO_KEY_ALIAS" -storepass "$RECORPO_KEYSTORE_PASSWORD" \
            2>&1 | grep -E "SHA1:|Alias name" | head -3

          echo "keystore written ($(wc -c < flutter_app/android/app/recorpo-release.jks) bytes)"
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Get dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ./flutter_app
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee /tmp/build-apk.log || {
            echo "==== APK BUILD FAILED — extracting cause ===="
            ERR=$(grep -iE -A4 "FAILURE:|What went wrong|error:|Caused by|Exception|not found|Could not" /tmp/build-apk.log | head -50 | tr '\n' ' ' | cut -c1-900)
            echo "::error::${ERR}"
            exit 1
          }

      - name: Build AAB (Release, for Play Store)
        if: steps.keystore.outputs.signed == 'true'
        working-directory: ./flutter_app
        run: |
          set -o pipefail
          flutter build appbundle --release 2>&1 | tee /tmp/build-aab.log || {
            echo "==== AAB BUILD FAILED — extracting cause ===="
            ERR=$(grep -iE -A4 "FAILURE:|What went wrong|error:|Caused by|Exception|not found|Could not" /tmp/build-aab.log | head -50 | tr '\n' ' ' | cut -c1-900)
            echo "::error::${ERR}"
            exit 1
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: steps.keystore.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Publish to Release (direct download links)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Recorpo — Android (beta)
          body: |
            **APK** (`app-release.apk`) — instalação lateral no Android; baixe direto no celular.

            **AAB** (`app-release.aab`) — arquivo assinado que sobe no Play Console (Track de testes internos, fechado, aberto ou produção).
          files: |
            flutter_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_app/build/app/outputs/bundle/release/app-release.aab
