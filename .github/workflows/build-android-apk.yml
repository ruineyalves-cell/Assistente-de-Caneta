name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true

      - name: Generate Android platform files
        working-directory: ./flutter_app
        run: flutter create --platforms=android --project-name assistente_caneta .

      - name: Get dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ./flutter_app
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee /tmp/build.log || {
            echo "==== BUILD FAILED — extracting cause ===="
            ERR=$(grep -iE -A4 "FAILURE:|What went wrong|error:|Caused by|Exception|not found|Could not" /tmp/build.log | head -50 | tr '\n' ' ' | cut -c1-900)
            echo "::error::${ERR}"
            exit 1
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
