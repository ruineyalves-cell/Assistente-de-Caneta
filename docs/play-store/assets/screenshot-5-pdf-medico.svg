<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <title>Recorpo — Screenshot 5: PDF médico</title>
  <defs>
    <radialGradient id="pageBg" cx="70%" cy="10%" r="90%">
      <stop offset="0%" stop-color="#1B4C5A" />
      <stop offset="50%" stop-color="#0E2E38" />
      <stop offset="100%" stop-color="#050E12" />
    </radialGradient>
    <radialGradient id="glow" cx="80%" cy="15%" r="45%">
      <stop offset="0%" stop-color="rgba(79,191,168,0.4)" />
      <stop offset="100%" stop-color="rgba(79,191,168,0)" />
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" /><stop offset="100%" stop-color="#B4E8DA" />
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A90D9" /><stop offset="100%" stop-color="#2B6CB0" />
    </linearGradient>
    <linearGradient id="pdfPaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" /><stop offset="100%" stop-color="#F0F4FA" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" />
      <feOffset dx="0" dy="24" result="off" />
      <feFlood flood-color="#000000" flood-opacity="0.55" />
      <feComposite in2="off" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" />
      <feOffset dx="0" dy="18" result="off" />
      <feFlood flood-color="#000000" flood-opacity="0.4" />
      <feComposite in2="off" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#pageBg)" />
  <rect width="1080" height="1920" fill="url(#glow)" />

  <!-- HEADLINE -->
  <g transform="translate(80 148)" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="0" y="0" font-size="26" font-weight="700" letter-spacing="6" fill="#4FBFA8">O DIFERENCIAL FINAL</text>
    <text x="0" y="90" font-size="82" font-weight="800" font-family="Georgia,serif"
          fill="url(#wordmark)" font-style="italic">Seu médico</text>
    <text x="0" y="176" font-size="82" font-weight="800" font-family="Georgia,serif" fill="#FFFFFF">vai agradecer.</text>
    <text x="0" y="232" font-size="22" fill="#B4E8DA">
      PDF de 90 dias · Anvisa, ABESO e ADA no rodapé.
    </text>
  </g>

  <!-- PDF flutuante em destaque + celular ao fundo -->
  <g transform="translate(220 460)">
    <!-- Celular meio-transparente ao fundo -->
    <g filter="url(#dropShadow)" opacity="0.55">
      <rect x="0" y="0" width="640" height="1280" rx="72" ry="72" fill="#1A2540" />
      <rect x="10" y="10" width="620" height="1260" rx="64" ry="64" fill="#131C2E" />
    </g>

    <!-- Papel PDF em destaque, girado levemente -->
    <g transform="translate(30 40) rotate(-4)" filter="url(#paperShadow)">
      <rect x="0" y="0" width="580" height="820" rx="10" fill="url(#pdfPaper)" />

      <!-- Cabeçalho do PDF -->
      <g font-family="'Inter',Arial,sans-serif" fill="#0F2544">
        <text x="40" y="60" font-size="24" font-weight="800" font-family="Georgia,serif">Relatório médico</text>
        <text x="40" y="88" font-size="12" fill="#6B7893">Recorpo · Paciente: Ana M. · Período: 90 dias</text>
      </g>
      <line x1="40" y1="108" x2="540" y2="108" stroke="#E1EAF5" stroke-width="1.5" />

      <!-- Bloco sumário executivo -->
      <g transform="translate(40 130)">
        <rect x="0" y="0" width="500" height="80" rx="8" fill="#EAF2FA" />
        <text x="16" y="24" font-family="'Inter',Arial,sans-serif" font-size="11"
              font-weight="700" letter-spacing="2" fill="#2B6CB0">SUMÁRIO EXECUTIVO</text>
        <text x="16" y="50" font-family="'Inter',Arial,sans-serif" font-size="14" fill="#0F2544">
          Adesão à dose: 96% · Streak: 42 dias · IMC:
        </text>
        <text x="16" y="70" font-family="'Inter',Arial,sans-serif" font-size="14" fill="#0F2544">
          32.4 → 28.1 (OMS: obesidade grau I → sobrepeso)
        </text>
      </g>

      <!-- KPI cards -->
      <g transform="translate(40 240)" font-family="'Inter',Arial,sans-serif">
        <g>
          <rect x="0" y="0" width="156" height="90" rx="8" fill="#FFFFFF" stroke="#D5DEEC" />
          <text x="16" y="24" font-size="10" font-weight="700" letter-spacing="1.6" fill="#6B7893">PESO ATUAL</text>
          <text x="16" y="58" font-size="26" font-weight="800" fill="#0F2544">87.2 kg</text>
          <text x="16" y="78" font-size="11" fill="#48BB78">-11.3 kg em 90 dias</text>
        </g>
        <g transform="translate(172 0)">
          <rect x="0" y="0" width="156" height="90" rx="8" fill="#FFFFFF" stroke="#D5DEEC" />
          <text x="16" y="24" font-size="10" font-weight="700" letter-spacing="1.6" fill="#6B7893">KG/SEMANA</text>
          <text x="16" y="58" font-size="26" font-weight="800" fill="#0F2544">0.87</text>
          <text x="16" y="78" font-size="11" fill="#48BB78">Ritmo saudável (ABESO)</text>
        </g>
        <g transform="translate(344 0)">
          <rect x="0" y="0" width="156" height="90" rx="8" fill="#FFFFFF" stroke="#D5DEEC" />
          <text x="16" y="24" font-size="10" font-weight="700" letter-spacing="1.6" fill="#6B7893">ADESÃO</text>
          <text x="16" y="58" font-size="26" font-weight="800" fill="#0F2544">96%</text>
          <text x="16" y="78" font-size="11" fill="#48BB78">12 de 13 doses</text>
        </g>
      </g>

      <!-- Gráfico de evolução -->
      <g transform="translate(40 360)" font-family="'Inter',Arial,sans-serif">
        <text x="0" y="0" font-size="12" font-weight="700" letter-spacing="1.6" fill="#6B7893">EVOLUÇÃO DE PESO — 90 DIAS</text>
        <g transform="translate(0 20)">
          <rect x="0" y="0" width="500" height="140" rx="8" fill="#F0F4FA" />
          <!-- linha de tendência -->
          <polyline points="20,30 80,40 140,50 200,70 260,75 320,90 380,105 440,115 480,120"
                    fill="none" stroke="#2B6CB0" stroke-width="3" stroke-linecap="round" />
          <polyline points="20,30 80,40 140,50 200,70 260,75 320,90 380,105 440,115 480,120 480,140 20,140"
                    fill="rgba(74,144,217,0.15)" stroke="none" />
          <!-- pontos -->
          <g fill="#2B6CB0">
            <circle cx="20" cy="30" r="4" /><circle cx="80" cy="40" r="4" />
            <circle cx="140" cy="50" r="4" /><circle cx="200" cy="70" r="4" />
            <circle cx="260" cy="75" r="4" /><circle cx="320" cy="90" r="4" />
            <circle cx="380" cy="105" r="4" /><circle cx="440" cy="115" r="4" />
            <circle cx="480" cy="120" r="4" />
          </g>
        </g>
      </g>

      <!-- Farmacovigilância -->
      <g transform="translate(40 550)" font-family="'Inter',Arial,sans-serif">
        <text x="0" y="0" font-size="12" font-weight="700" letter-spacing="1.6" fill="#6B7893">FARMACOVIGILÂNCIA</text>
        <g transform="translate(0 20)">
          <rect x="0" y="0" width="500" height="90" rx="8" fill="#FFF6EF" stroke="#F1C87C" />
          <text x="16" y="30" font-size="14" font-weight="700" fill="#0F2544">Náusea moderada · 8 registros</text>
          <text x="16" y="56" font-size="12" fill="#6B7893">Concentrada nas 4 primeiras semanas — padrão esperado</text>
          <text x="16" y="76" font-size="12" fill="#6B7893">para análogos GLP-1 (bula Anvisa).</text>
        </g>
      </g>

      <!-- Referências -->
      <g transform="translate(40 700)" font-family="'Inter',Arial,sans-serif" fill="#6B7893">
        <text x="0" y="0" font-size="10" font-weight="700" letter-spacing="1.6">REFERÊNCIAS</text>
        <text x="0" y="22" font-size="10">Anvisa (bula oficial) · ABESO 2023 · ADA 2024</text>
      </g>

      <!-- Selo Recorpo -->
      <g transform="translate(440 760)">
        <rect x="0" y="0" width="100" height="34" rx="17" fill="#2B6CB0" />
        <text x="50" y="22" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
              font-size="11" font-weight="700" letter-spacing="2" fill="#FFFFFF">RECORPO</text>
      </g>
    </g>

    <!-- Botão baixar flutuando -->
    <g transform="translate(190 1080)" filter="url(#paperShadow)">
      <rect x="0" y="0" width="260" height="72" rx="36" fill="url(#cta)" />
      <text x="130" y="47" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
            font-size="20" font-weight="700" fill="#FFFFFF">⬇ Baixar PDF</text>
    </g>
  </g>

  <!-- SUBHEAD -->
  <g transform="translate(80 1810)" font-family="'Inter',Arial,sans-serif">
    <text x="0" y="0" font-size="24" fill="#B4E8DA" font-weight="600">
      Consulta rende quando você chega com dados de verdade.
    </text>
    <text x="0" y="34" font-size="22" fill="#8DA3C7">
      Peso, adesão, sintomas, evolução — tudo em uma página.
    </text>
  </g>
</svg>
