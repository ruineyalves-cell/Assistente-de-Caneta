<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <title>Recorpo — Screenshot 2: Dashboard 4 eixos</title>
  <defs>
    <radialGradient id="pageBg" cx="70%" cy="15%" r="90%">
      <stop offset="0%" stop-color="#1B3E6C" />
      <stop offset="50%" stop-color="#0F2544" />
      <stop offset="100%" stop-color="#070E1A" />
    </radialGradient>
    <radialGradient id="glowTR" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="rgba(74,144,217,0.5)" />
      <stop offset="100%" stop-color="rgba(74,144,217,0)" />
    </radialGradient>
    <linearGradient id="appBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131C2E" />
      <stop offset="100%" stop-color="#0B1220" />
    </linearGradient>
    <!-- Gradientes por eixo -->
    <linearGradient id="gRefeicao" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E27D3F" /><stop offset="100%" stop-color="#B35F28" />
    </linearGradient>
    <linearGradient id="gAgua" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DB5C6" /><stop offset="100%" stop-color="#287E8B" />
    </linearGradient>
    <linearGradient id="gPeso" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FBFA8" /><stop offset="100%" stop-color="#2E8A78" />
    </linearGradient>
    <linearGradient id="gSintomas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E76F51" /><stop offset="100%" stop-color="#AB4E38" />
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" /><stop offset="100%" stop-color="#B9D4F0" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" />
      <feOffset dx="0" dy="24" result="off" />
      <feFlood flood-color="#000000" flood-opacity="0.55" />
      <feComposite in2="off" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#pageBg)" />
  <rect width="1080" height="1920" fill="url(#glowTR)" />

  <!-- HEADLINE -->
  <g transform="translate(80 148)" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="0" y="0" font-size="26" font-weight="700" letter-spacing="6" fill="#4A90D9">SEU DIA INTEIRO</text>
    <text x="0" y="90" font-size="82" font-weight="800" font-family="Georgia,serif"
          fill="url(#wordmark)" font-style="italic">4 cuidados,</text>
    <text x="0" y="176" font-size="82" font-weight="800" font-family="Georgia,serif" fill="#FFFFFF">uma tela.</text>
    <text x="0" y="232" font-size="22" fill="#8DA3C7">
      Refeição · Água · Peso · Sintomas — sempre à mão.
    </text>
  </g>

  <!-- MOCKUP -->
  <g transform="translate(220 460)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="640" height="1280" rx="72" ry="72" fill="#1A2540" />
    <rect x="10" y="10" width="620" height="1260" rx="64" ry="64" fill="url(#appBg)" />

    <rect x="240" y="26" width="160" height="26" rx="13" fill="#0B1220" />
    <text x="60" y="76" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#9AA6B8">9:41</text>
    <g transform="translate(560 66)">
      <rect x="0" y="0" width="8" height="12" rx="2" fill="#9AA6B8" />
      <rect x="12" y="2" width="8" height="10" rx="2" fill="#9AA6B8" opacity="0.7" />
      <rect x="24" y="4" width="8" height="8" rx="2" fill="#9AA6B8" opacity="0.4" />
    </g>

    <!-- Saudação -->
    <g transform="translate(48 120)" font-family="'Inter',Arial,sans-serif">
      <text x="0" y="0" font-size="30" font-weight="700" fill="#F1F5FB">Bom dia, Ana</text>
      <text x="0" y="34" font-size="17" fill="#9AA6B8">Você está em dia com sua rotina.</text>
    </g>

    <!-- Foco do dia -->
    <g transform="translate(48 210)">
      <rect x="0" y="0" width="544" height="94" rx="16" fill="rgba(74,144,217,0.10)"
            stroke="rgba(74,144,217,0.35)" stroke-width="1" />
      <text x="20" y="30" font-family="'Inter',Arial,sans-serif" font-size="12"
            font-weight="700" letter-spacing="3" fill="#4A90D9">FOCO DO DIA</text>
      <text x="20" y="66" font-family="'Inter',Arial,sans-serif" font-size="26"
            font-weight="700" fill="#F1F5FB">Blindagem Muscular</text>
    </g>

    <!-- Grid 2x2 de eixos -->
    <g transform="translate(48 330)" font-family="'Inter',Arial,sans-serif">
      <!-- Refeição -->
      <g transform="translate(0 0)">
        <rect x="0" y="0" width="262" height="200" rx="24" fill="#131C2E"
              stroke="rgba(255,255,255,0.06)" stroke-width="1" />
        <circle cx="220" cy="30" r="60" fill="url(#gRefeicao)" opacity="0.25" />
        <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#gRefeicao)" />
        <text x="46" y="55" text-anchor="middle" font-size="26">🍊</text>
        <text x="20" y="115" font-size="20" font-weight="700" fill="#F1F5FB">Refeições</text>
        <text x="20" y="152" font-size="42" font-weight="800" fill="#F1F5FB">2</text>
        <text x="20" y="180" font-size="14" fill="#9AA6B8">registradas hoje</text>
      </g>
      <!-- Água -->
      <g transform="translate(282 0)">
        <rect x="0" y="0" width="262" height="200" rx="24" fill="#131C2E"
              stroke="rgba(255,255,255,0.06)" stroke-width="1" />
        <circle cx="220" cy="30" r="60" fill="url(#gAgua)" opacity="0.25" />
        <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#gAgua)" />
        <text x="46" y="55" text-anchor="middle" font-size="26">💧</text>
        <text x="20" y="115" font-size="20" font-weight="700" fill="#F1F5FB">Água</text>
        <text x="20" y="152" font-size="42" font-weight="800" fill="#F1F5FB">2.4L</text>
        <text x="20" y="180" font-size="14" fill="#9AA6B8">78% da meta</text>
      </g>
      <!-- Peso -->
      <g transform="translate(0 220)">
        <rect x="0" y="0" width="262" height="200" rx="24" fill="#131C2E"
              stroke="rgba(255,255,255,0.06)" stroke-width="1" />
        <circle cx="220" cy="30" r="60" fill="url(#gPeso)" opacity="0.25" />
        <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#gPeso)" />
        <text x="46" y="55" text-anchor="middle" font-size="26">⚖️</text>
        <text x="20" y="115" font-size="20" font-weight="700" fill="#F1F5FB">Peso</text>
        <text x="20" y="152" font-size="42" font-weight="800" fill="#F1F5FB">87.2</text>
        <text x="20" y="180" font-size="14" fill="#9AA6B8">kg · -0.6 vs último</text>
      </g>
      <!-- Sintomas -->
      <g transform="translate(282 220)">
        <rect x="0" y="0" width="262" height="200" rx="24" fill="#131C2E"
              stroke="rgba(255,255,255,0.06)" stroke-width="1" />
        <circle cx="220" cy="30" r="60" fill="url(#gSintomas)" opacity="0.25" />
        <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#gSintomas)" />
        <text x="46" y="55" text-anchor="middle" font-size="26">🩺</text>
        <text x="20" y="115" font-size="20" font-weight="700" fill="#F1F5FB">Sintomas</text>
        <text x="20" y="152" font-size="42" font-weight="800" fill="#F1F5FB">OK</text>
        <text x="20" y="180" font-size="14" fill="#9AA6B8">Nada registrado hoje</text>
      </g>
    </g>

    <!-- Streak + Score -->
    <g transform="translate(48 780)" font-family="'Inter',Arial,sans-serif">
      <rect x="0" y="0" width="262" height="120" rx="20" fill="rgba(233,160,60,0.12)"
            stroke="rgba(233,160,60,0.4)" stroke-width="1" />
      <text x="20" y="34" font-size="12" font-weight="700" letter-spacing="3" fill="#E9A03C">🔥 STREAK</text>
      <text x="20" y="86" font-size="42" font-weight="800" fill="#F1F5FB">14 dias</text>
      <rect x="282" y="0" width="262" height="120" rx="20" fill="rgba(74,144,217,0.10)"
            stroke="rgba(74,144,217,0.4)" stroke-width="1" />
      <text x="302" y="34" font-size="12" font-weight="700" letter-spacing="3" fill="#4A90D9">⭐ SCORE HOJE</text>
      <text x="302" y="86" font-size="42" font-weight="800" fill="#F1F5FB">92</text>
    </g>

    <!-- Nav flutuante -->
    <g transform="translate(140 1140)">
      <rect x="0" y="0" width="360" height="70" rx="35" fill="rgba(255,255,255,0.06)"
            stroke="rgba(255,255,255,0.12)" stroke-width="1" />
      <circle cx="60" cy="35" r="20" fill="#4A90D9" />
      <text x="60" y="42" text-anchor="middle" font-size="18" fill="#FFF">🏠</text>
      <text x="180" y="42" text-anchor="middle" font-size="18" fill="#8DA3C7">📊</text>
      <text x="300" y="42" text-anchor="middle" font-size="18" fill="#8DA3C7">👤</text>
    </g>

    <rect x="240" y="1210" width="160" height="6" rx="3" fill="rgba(255,255,255,0.35)" />
  </g>

  <!-- SUBHEAD RODAPÉ -->
  <g transform="translate(80 1810)" font-family="'Inter',Arial,sans-serif">
    <text x="0" y="0" font-size="24" fill="#B9D4F0" font-weight="600">
      Estilo Samsung Health, mas focado no que você toma.
    </text>
    <text x="0" y="34" font-size="22" fill="#8DA3C7">Streak, score e evolução — sem inflar.</text>
  </g>
</svg>
