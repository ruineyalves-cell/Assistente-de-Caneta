<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <title>Recorpo — Screenshot 4: Farmacovigilância de bulas</title>
  <defs>
    <radialGradient id="pageBg" cx="30%" cy="15%" r="90%">
      <stop offset="0%" stop-color="#3A2E4A" />
      <stop offset="50%" stop-color="#2A1F36" />
      <stop offset="100%" stop-color="#0E0916" />
    </radialGradient>
    <radialGradient id="glow" cx="20%" cy="10%" r="40%">
      <stop offset="0%" stop-color="rgba(231,111,81,0.4)" />
      <stop offset="100%" stop-color="rgba(231,111,81,0)" />
    </radialGradient>
    <linearGradient id="appBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131C2E" /><stop offset="100%" stop-color="#0B1220" />
    </linearGradient>
    <linearGradient id="sintomasGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E76F51" /><stop offset="100%" stop-color="#AB4E38" />
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A90D9" /><stop offset="100%" stop-color="#2B6CB0" />
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" /><stop offset="100%" stop-color="#F3C1B4" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" />
      <feOffset dx="0" dy="24" result="off" />
      <feFlood flood-color="#000000" flood-opacity="0.55" />
      <feComposite in2="off" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#pageBg)" />
  <rect width="1080" height="1920" fill="url(#glow)" />

  <!-- HEADLINE -->
  <g transform="translate(80 148)" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="0" y="0" font-size="26" font-weight="700" letter-spacing="6" fill="#E76F51">FARMACOVIGILÂNCIA SÉRIA</text>
    <text x="0" y="90" font-size="82" font-weight="800" font-family="Georgia,serif"
          fill="url(#wordmark)" font-style="italic">15 sintomas</text>
    <text x="0" y="176" font-size="82" font-weight="800" font-family="Georgia,serif" fill="#FFFFFF">de bula Anvisa.</text>
    <text x="0" y="232" font-size="22" fill="#C9B3D3">
      Sabe o que é normal, sabe o que merece o médico.
    </text>
  </g>

  <!-- MOCKUP -->
  <g transform="translate(220 460)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="640" height="1280" rx="72" ry="72" fill="#1A2540" />
    <rect x="10" y="10" width="620" height="1260" rx="64" ry="64" fill="url(#appBg)" />

    <rect x="240" y="26" width="160" height="26" rx="13" fill="#0B1220" />
    <text x="60" y="76" font-family="'Inter',Arial,sans-serif" font-size="18" fill="#9AA6B8">9:41</text>
    <g transform="translate(560 66)">
      <rect x="0" y="0" width="8" height="12" rx="2" fill="#9AA6B8" />
      <rect x="12" y="2" width="8" height="10" rx="2" fill="#9AA6B8" opacity="0.7" />
      <rect x="24" y="4" width="8" height="8" rx="2" fill="#9AA6B8" opacity="0.4" />
    </g>

    <!-- Título -->
    <g transform="translate(48 120)" font-family="'Inter',Arial,sans-serif">
      <text x="0" y="0" font-size="30" font-weight="700" fill="#F1F5FB">Como você está?</text>
      <text x="0" y="34" font-size="16" fill="#9AA6B8">Toque nos sintomas e escolha a intensidade.</text>
    </g>

    <!-- Grid de chips de sintomas -->
    <g transform="translate(48 230)" font-family="'Inter',Arial,sans-serif" font-size="14">
      <!-- linha 1 -->
      <g><rect x="0" y="0" width="140" height="52" rx="26" fill="url(#sintomasGrad)" /><text x="70" y="32" text-anchor="middle" fill="#FFFFFF" font-weight="700">🤢 Náusea</text></g>
      <g transform="translate(148 0)"><rect x="0" y="0" width="140" height="52" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" /><text x="70" y="32" text-anchor="middle" fill="#9AA6B8">Refluxo</text></g>
      <g transform="translate(296 0)"><rect x="0" y="0" width="140" height="52" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" /><text x="70" y="32" text-anchor="middle" fill="#9AA6B8">Fadiga</text></g>
      <!-- linha 2 -->
      <g transform="translate(0 62)"><rect x="0" y="0" width="140" height="52" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" /><text x="70" y="32" text-anchor="middle" fill="#9AA6B8">Constipação</text></g>
      <g transform="translate(148 62)"><rect x="0" y="0" width="140" height="52" rx="26" fill="url(#sintomasGrad)" /><text x="70" y="32" text-anchor="middle" fill="#FFFFFF" font-weight="700">😵‍💫 Tontura</text></g>
      <g transform="translate(296 62)"><rect x="0" y="0" width="140" height="52" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" /><text x="70" y="32" text-anchor="middle" fill="#9AA6B8">Diarreia</text></g>
      <!-- linha 3 -->
      <g transform="translate(0 124)"><rect x="0" y="0" width="140" height="52" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" /><text x="70" y="32" text-anchor="middle" fill="#9AA6B8">Cefaleia</text></g>
      <g transform="translate(148 124)"><rect x="0" y="0" width="140" height="52" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" /><text x="70" y="32" text-anchor="middle" fill="#9AA6B8">Vômito</text></g>
      <g transform="translate(296 124)"><rect x="0" y="0" width="140" height="52" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" /><text x="70" y="32" text-anchor="middle" fill="#9AA6B8">+ 7 sintomas</text></g>
    </g>

    <!-- Intensidade selecionada: náusea -->
    <g transform="translate(48 460)" font-family="'Inter',Arial,sans-serif">
      <text x="0" y="0" font-size="13" font-weight="700" letter-spacing="3" fill="#E76F51">🤢 NÁUSEA — INTENSIDADE</text>
      <g transform="translate(0 20)">
        <g><rect x="0" y="0" width="170" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" /><text x="85" y="34" text-anchor="middle" font-size="24" fill="#FFFFFF">🙂</text><text x="85" y="66" text-anchor="middle" font-size="14" fill="#8DA3C7">Leve</text></g>
        <g transform="translate(184 0)">
          <rect x="0" y="0" width="170" height="90" rx="16" fill="url(#sintomasGrad)" />
          <text x="85" y="34" text-anchor="middle" font-size="24" fill="#FFFFFF">😐</text>
          <text x="85" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Moderada</text>
        </g>
        <g transform="translate(368 0)"><rect x="0" y="0" width="170" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" /><text x="85" y="34" text-anchor="middle" font-size="24" fill="#FFFFFF">😖</text><text x="85" y="66" text-anchor="middle" font-size="14" fill="#8DA3C7">Intensa</text></g>
      </g>
    </g>

    <!-- Aviso de bula -->
    <g transform="translate(48 640)" font-family="'Inter',Arial,sans-serif">
      <rect x="0" y="0" width="544" height="180" rx="16" fill="rgba(231,111,81,0.10)"
            stroke="rgba(231,111,81,0.35)" stroke-width="1" />
      <text x="20" y="34" font-size="16" fill="#E76F51">📋</text>
      <text x="50" y="38" font-size="14" font-weight="700" letter-spacing="2" fill="#E76F51">
        FONTE: BULA OFICIAL ANVISA
      </text>
      <text x="20" y="76" font-size="15" fill="#F1F5FB" font-weight="600">
        Náusea é o efeito colateral mais comum
      </text>
      <text x="20" y="102" font-size="15" fill="#F1F5FB" font-weight="600">
        de análogos GLP-1 no início do tratamento.
      </text>
      <text x="20" y="136" font-size="13" fill="#9AA6B8">
        Costuma reduzir em 2–4 semanas. Persistente e
      </text>
      <text x="20" y="158" font-size="13" fill="#9AA6B8">
        intensa: converse com quem prescreveu.
      </text>
    </g>

    <!-- CTA -->
    <g transform="translate(48 860)">
      <rect x="0" y="0" width="544" height="72" rx="36" fill="url(#cta)" />
      <text x="272" y="47" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
            font-size="22" font-weight="700" fill="#FFFFFF">Registrar sintoma</text>
    </g>

    <rect x="240" y="1210" width="160" height="6" rx="3" fill="rgba(255,255,255,0.35)" />
  </g>

  <!-- SUBHEAD -->
  <g transform="translate(80 1810)" font-family="'Inter',Arial,sans-serif">
    <text x="0" y="0" font-size="24" fill="#F3C1B4" font-weight="600">
      Não é achismo. É bula.
    </text>
    <text x="0" y="34" font-size="22" fill="#C9B3D3">
      15 sintomas curados de fontes Anvisa oficiais.
    </text>
  </g>
</svg>
