services:
  postgres:
    image: postgres:16-alpine
    container_name: assistente-caneta-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: assistente_caneta
      POSTGRES_USER: app
      POSTGRES_PASSWORD: dev_local_only_change_in_prod
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d assistente_caneta"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
