name: assistente_caneta
description: App de acompanhamento de conformidade para pacientes em tratamento GLP-1 no Brasil.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & API
  dio: ^5.3.0

  # Auth / secure storage
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.0.0

  # UI
  cupertino_icons: ^1.0.0
  fl_chart: ^0.68.0

  # Dates & formatting
  intl: ^0.20.2   # exigido pelo flutter_localizations do SDK 3.44.6

  # State management (Riverpod)
  flutter_riverpod: ^2.5.1

  # Persistência local (perfil e peso entre sessões)
  shared_preferences: ^2.2.3

  # Câmera & imagem (foto da refeição, scanner ao vivo)
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # OCR (prescrição nutricional)
  google_mlkit_text_recognition: ^0.13.0

  # Health Connect (FC + gasto ativo do S25)
  health: ^13.3.1   # doc pedia ^11.0.0, mas exige intl<0.20 (incompatível com o SDK)

  # PDF para o médico
  pdf: ^3.11.1
  printing: ^5.13.2

  # Home Screen Widgets do Android (Lote 17)
  home_widget: ^0.9.3

  # Notificações locais acolhedoras (Lote 19).
  # v16.3.3 é a última linha estável que não força compileSdk 36 nem
  # traz dependências AAR incompatíveis com Flutter 3.44/AGP 9.
  flutter_local_notifications: ^16.3.3
  timezone: ^0.9.4
  permission_handler: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
