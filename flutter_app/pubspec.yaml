name: assistente_caneta
description: App de acompanhamento de conformidade para pacientes em tratamento GLP-1 no Brasil.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & API
  dio: ^5.3.0

  # Auth / secure storage
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.0.0

  # UI
  cupertino_icons: ^1.0.0
  fl_chart: ^0.65.0

  # Dates & formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
