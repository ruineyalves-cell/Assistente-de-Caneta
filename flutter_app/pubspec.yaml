name: assistente_caneta
description: App de acompanhamento de conformidade para pacientes em tratamento GLP-1 no Brasil.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & API
  dio: ^5.3.0

  # Auth / secure storage
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.0.0

  # UI
  cupertino_icons: ^1.0.0
  fl_chart: ^0.68.0

  # Dates & formatting
  intl: ^0.20.2   # exigido pelo flutter_localizations do SDK 3.44.6

  # State management (Riverpod)
  flutter_riverpod: ^2.5.1

  # Persistência local (perfil e peso entre sessões)
  shared_preferences: ^2.2.3

  # Câmera & imagem (foto da refeição, scanner ao vivo)
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # OCR (prescrição nutricional). 0.14+ compatível com image_labeling 0.13
  google_mlkit_text_recognition: ^0.14.0

  # Health Connect (FC + gasto ativo do S25)
  health: ^13.3.1   # doc pedia ^11.0.0, mas exige intl<0.20 (incompatível com o SDK)

  # PDF para o médico
  pdf: ^3.11.1
  printing: ^5.13.2

  # Home Screen Widgets do Android (Lote 17)
  home_widget: ^0.9.3

  # Notificações locais acolhedoras (Lote 19).
  # awesome_notifications no lugar de flutter_local_notifications: aquela
  # linha tem duas armadilhas em Flutter 3.44 + compileSdk 36 —
  # v<=16 falha `bigLargeIcon` ambíguo, v>=17 falha AAR metadata.
  awesome_notifications: ^0.10.0
  timezone: ^0.9.4
  permission_handler: ^11.2.0

  # Lote 20 — Login social (Google) e assinatura Premium (Play Billing)
  google_sign_in: ^6.2.1
  in_app_purchase: ^3.2.0

  # Lote 21 — Reconhecimento de comida na foto (roda on-device, sem chave)
  google_mlkit_image_labeling: ^0.13.0

  # Lote 32.5 — App lock com PIN + biometria (fingerprint/face).
  # crypto para hash SHA-256 do PIN (nunca guardar em texto claro).
  local_auth: ^2.3.0
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
