<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <title>Recorpo — Screenshot 1: Boas-vindas</title>
  <defs>
    <!-- Fundo do banner Play Store -->
    <radialGradient id="pageBg" cx="30%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#1B3E6C" />
      <stop offset="50%" stop-color="#0F2544" />
      <stop offset="100%" stop-color="#070E1A" />
    </radialGradient>
    <radialGradient id="glowTL" cx="20%" cy="15%" r="40%">
      <stop offset="0%" stop-color="rgba(74,144,217,0.5)" />
      <stop offset="100%" stop-color="rgba(74,144,217,0)" />
    </radialGradient>
    <!-- Tela do app: dark azul -->
    <linearGradient id="appBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131C2E" />
      <stop offset="100%" stop-color="#0B1220" />
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A90D9" />
      <stop offset="100%" stop-color="#2B6CB0" />
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#B9D4F0" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" />
      <feOffset dx="0" dy="24" result="off" />
      <feFlood flood-color="#000000" flood-opacity="0.55" />
      <feComposite in2="off" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Página -->
  <rect width="1080" height="1920" fill="url(#pageBg)" />
  <rect width="1080" height="1920" fill="url(#glowTL)" />

  <!-- HEADLINE -->
  <g transform="translate(80 148)" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="0" y="0" font-size="26" font-weight="700" letter-spacing="6"
          fill="#4A90D9">O PRIMEIRO APP</text>
    <text x="0" y="90" font-size="82" font-weight="800" fill="url(#wordmark)"
          font-family="Georgia,'Times New Roman',serif" font-style="italic">
      Feito pra quem
    </text>
    <text x="0" y="176" font-size="82" font-weight="800" fill="#FFFFFF"
          font-family="Georgia,'Times New Roman',serif">
      toma caneta.
    </text>
    <text x="0" y="232" font-size="22" fill="#8DA3C7" letter-spacing="0.4">
      Ozempic · Mounjaro · Wegovy · Saxenda
    </text>
  </g>

  <!-- MOCKUP CELULAR -->
  <g transform="translate(220 460)" filter="url(#dropShadow)">
    <!-- Frame externo -->
    <rect x="0" y="0" width="640" height="1280" rx="72" ry="72" fill="#1A2540" />
    <rect x="10" y="10" width="620" height="1260" rx="64" ry="64" fill="url(#appBg)" />

    <!-- Notch/status bar -->
    <rect x="240" y="26" width="160" height="26" rx="13" fill="#0B1220" />
    <text x="60" y="76" font-family="'Inter',Arial,sans-serif"
          font-size="18" fill="#9AA6B8">9:41</text>
    <g transform="translate(560 66)">
      <rect x="0" y="0" width="8" height="12" rx="2" fill="#9AA6B8" />
      <rect x="12" y="2" width="8" height="10" rx="2" fill="#9AA6B8" opacity="0.7" />
      <rect x="24" y="4" width="8" height="8" rx="2" fill="#9AA6B8" opacity="0.4" />
    </g>

    <!-- Conteúdo da tela: boas-vindas do app -->
    <g transform="translate(320 340)">
      <!-- Círculo hero com caneta -->
      <circle cx="0" cy="0" r="140" fill="rgba(74,144,217,0.18)" />
      <circle cx="0" cy="0" r="100" fill="rgba(74,144,217,0.28)" />
      <!-- Mini caneta -->
      <g transform="translate(0 0)">
        <ellipse cx="0" cy="-88" rx="30" ry="16" fill="#F1C87C" />
        <rect x="-26" y="-80" width="52" height="8" rx="3" fill="#E9A03C" />
        <rect x="-40" y="-70" width="80" height="150" rx="20" fill="rgba(255,255,255,0.16)"
              stroke="rgba(255,255,255,0.36)" stroke-width="1.2" />
        <rect x="-28" y="-56" width="56" height="122" rx="14" fill="#4A90D9" opacity="0.9" />
        <line x1="-40" y1="-24" x2="40" y2="-24" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
        <line x1="-40" y1="10" x2="40" y2="10" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
        <line x1="-40" y1="44" x2="40" y2="44" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
        <text x="0" y="30" text-anchor="middle" font-family="Georgia,serif"
              font-size="76" font-weight="700" font-style="italic" fill="#FFFFFF">R</text>
        <rect x="-32" y="80" width="64" height="16" rx="6" fill="#0B1220" />
        <polygon points="-3,96 3,96 0,110" fill="#E1EAF5" />
      </g>
    </g>

    <!-- Título + copy do onboarding -->
    <g transform="translate(60 620)" font-family="'Inter',Arial,sans-serif">
      <text x="260" y="0" text-anchor="middle" font-size="18" letter-spacing="4"
            font-weight="700" fill="#4A90D9">BEM-VINDO AO</text>
      <text x="260" y="60" text-anchor="middle" font-size="52" font-weight="800"
            font-family="Georgia,serif" fill="#F1F5FB">Recorpo</text>
      <text x="260" y="120" text-anchor="middle" font-size="24" fill="#9AA6B8">
        Vamos configurar 2 coisas
      </text>
      <text x="260" y="152" text-anchor="middle" font-size="24" fill="#9AA6B8">
        rápidas. Menos de 1 minuto.
      </text>
    </g>

    <!-- Cards preview -->
    <g transform="translate(56 830)" font-family="'Inter',Arial,sans-serif">
      <!-- Card 1 -->
      <rect x="0" y="0" width="528" height="86" rx="16" fill="rgba(255,255,255,0.04)"
            stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <rect x="20" y="20" width="46" height="46" rx="12" fill="#2B6CB0" />
      <text x="43" y="52" text-anchor="middle" font-size="24" fill="#FFF">💊</text>
      <text x="90" y="40" font-size="20" font-weight="700" fill="#F1F5FB">
        Sua medicação
      </text>
      <text x="90" y="66" font-size="15" fill="#9AA6B8">
        Para calibrar orientações e alertas.
      </text>
      <!-- Card 2 -->
      <rect x="0" y="104" width="528" height="86" rx="16" fill="rgba(255,255,255,0.04)"
            stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <rect x="20" y="124" width="46" height="46" rx="12" fill="#2E8A78" />
      <text x="43" y="156" text-anchor="middle" font-size="24" fill="#FFF">⚖️</text>
      <text x="90" y="144" font-size="20" font-weight="700" fill="#F1F5FB">
        Peso atual e meta
      </text>
      <text x="90" y="170" font-size="15" fill="#9AA6B8">
        Para acompanhar sua evolução.
      </text>
    </g>

    <!-- CTA -->
    <g transform="translate(56 1080)">
      <rect x="0" y="0" width="528" height="72" rx="36" fill="url(#cta)" />
      <text x="264" y="47" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
            font-size="22" font-weight="700" fill="#FFFFFF">Continuar</text>
    </g>

    <!-- Barra inferior -->
    <rect x="240" y="1210" width="160" height="6" rx="3" fill="rgba(255,255,255,0.35)" />
  </g>

  <!-- SUBHEAD RODAPÉ -->
  <g transform="translate(80 1810)" font-family="'Inter',Arial,sans-serif">
    <text x="0" y="0" font-size="24" fill="#B9D4F0" font-weight="600">
      Sem trial expirando. Sem cartão pedido.
    </text>
    <text x="0" y="34" font-size="22" fill="#8DA3C7">
      Grátis, de verdade. Premium é opcional.
    </text>
  </g>
</svg>
